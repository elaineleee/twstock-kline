name: Daily morning brief

on:
  # 14:30 TWT == 06:30 UTC, weekdays only.
  # GitHub cron runs in UTC; the schedule itself can drift by a few minutes.
  schedule:
    - cron: '30 6 * * 1-5'
  # Allow manual run from the Actions tab.
  workflow_dispatch:

# The workflow commits regenerated brief JSON + chart HTML back to the repo,
# which triggers Render to redeploy.
permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wipe stale charts (always regenerate today's set)
        run: |
          rm -rf data/charts
          mkdir -p data/charts data/briefs data/universe

      - name: Generate brief
        run: python morning_brief.py

      - name: Commit & push if changed
        run: |
          git config user.name  "twstock-kline-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/briefs data/charts data/pattern_passlist.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "daily brief: $(date -u +'%Y-%m-%d %H:%MZ')"
          git push
